name: Frontend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - "apps/frontend/**"
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - "apps/frontend/**"

jobs:
  build:
    name: Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build
